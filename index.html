<<!DOCTYPE html>

<html>

<head>

    <title>
        Attendance Dashboard
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>
            Attendance System
        </h2>

        <a href="/">
            Home
        </a>

        <a href="/view_attendance">
            View Attendance
        </a>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main">

        <div class="topbar">

            <h1>
                Dashboard
            </h1>

        </div>

        <!-- CARDS -->

        <div class="cards">

            <div class="card">

                <h2>
                    Subjects
                </h2>

                <p>
                    {{ subjects|length }}
                </p>

            </div>

            <div class="card">

                <h2>
                    Status
                </h2>

                <p>
                    Active
                </p>

            </div>

        </div>

        <!-- ATTENDANCE FORM -->

        <div class="form-box">

            <h2>
                Start Attendance
            </h2>

            <form id="scannerForm">

                <select
                    name="subject"
                    required
                >

                    <option value="">
                        Select Subject
                    </option>

                    {% for subject in subjects %}

                    <option value="{{ subject }}">

                        {{ subject }}

                    </option>

                    {% endfor %}

                </select>

                <button type="submit">

                    Start Scanner

                </button>

            </form>

            <button
                onclick="calculatePercentage()"
            >

                Calculate Percentage

            </button>

            <button
                onclick="generateReport()"
            >

                Generate Report

            </button>

        </div>

    </div>

    <!-- JAVASCRIPT -->

    <script>

        // =========================
        // START SCANNER
        // =========================

        document
        .getElementById(
            "scannerForm"
        )

        .addEventListener(

            "submit",

            async function(e) {

                e.preventDefault()

                const formData =
                new FormData(this)

                const response =
                await fetch(

                    "/start_scanner",

                    {

                        method: "POST",

                        body: formData

                    }

                )

                const data =
                await response.json()

                alert(
                    data.message
                )

            }

        )

        // =========================
        // CALCULATE %
        // =========================

        async function
        calculatePercentage() {

            const response =
            await fetch(
                "/calculate_percentage"
            )

            const data =
            await response.json()

            alert(
                data.message
            )

        }

        // =========================
        // GENERATE REPORT
        // =========================

        async function
        generateReport() {

            const response =
            await fetch(
                "/generate_report"
            )

            const data =
            await response.json()

            alert(
                data.message
            )

        }

    </script>

</body>

</html>
